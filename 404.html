        <i class="fa-solid fa-bars"></i>
    </button>
    <div class="sidenav-overlay" onclick="toggleMobileNav()"></div>

    <!-- SIDENAV -->
    <div id="mySidenav" class="sidenav">
          <a href="/"><i class="fa-solid fa-house"></i><span id="nav-home">Main Page</span></a>
          <a href="/certificates"><i class="fa-solid fa-graduation-cap"></i><span id="nav-cert">Certifications</span></a>
          <a href="/projects"><i class="fa-solid fa-file"></i><span id="nav-projects">Projects</span></a>
          <div class="sidenav-bottom">
              <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()">
                <i class="fa-solid fa-moon"></i>
              </button>
              <div class="lang-dropdown">
                  <button class="lang-dropdown-btn" onclick="toggleLangDropdown()">
                      <i class="fa-solid fa-globe"></i>
                      <span class="lang-label">English</span>

                  </button>
                  <div class="lang-dropdown-menu">
                      <button class="lang-option active-lang" data-lang="en">

    <main class="not-found-page">
        <div class="not-found-content reveal">
            <div class="not-found-code">404</div>
            <h1 id="nf-title">Looks like this page got hardened out of existence.</h1>
            <p id="nf-desc">The URL you tried doesn&#39;t match any route on this site. It might&#39;ve moved, or it may have never existed in the first place.</p>
            <div class="not-found-actions">
                <a href="/" class="btn-primary">
                    <i class="fa-solid fa-house"></i> <span id="nf-home">Back to home</span>
                </a>
                <a href="/projects" class="btn-secondary">
                    <i class="fa-solid fa-file"></i> <span id="nf-projects">Browse projects</span>
                </a>
            </div>
            <p class="not-found-glitch">$ curl -I &lt;path&gt; &mdash;&gt; HTTP/1.1 404 Not Found</p>
        </div>
    </main>

    <script src="/function.js?v=20260520"></script>
